name: Deploy to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Astro site
        run: cd astro-site && npx astro build
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --cwd astro-site'
      - name: Submit sitemap to IndexNow
        run: |
          node -e "
            const fs = require('fs');
            const sitemap = fs.readFileSync('astro-site/dist/sitemap-0.xml', 'utf8');
            const matches = sitemap.matchAll(/<loc>([^<]+)<\/loc>/g);
            const urls = Array.from(matches, m => m[1]);
            fs.writeFileSync('indexnow-urls.json', JSON.stringify(urls));
            console.log('Collected ' + urls.length + ' URLs for IndexNow');
          "
        if: always()
      - name: Call IndexNow API
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY || '' }}
        run: |
          node -e "
            const fs = require('fs');
            const urls = JSON.parse(fs.readFileSync('indexnow-urls.json', 'utf8'));
            const keyFromFile = fs.readFileSync('public/indexnow-key.txt', 'utf8').trim();
            const payload = {
              host: 'personalai.cloud',
              key: keyFromFile,
              keyLocation: 'https://personalai.cloud/indexnow-key.txt',
              urlList: urls
            };
            const https = require('https');
            const data = JSON.stringify(payload);
            const options = {
              hostname: 'www.bing.com',
              path: '/indexnow',
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) }
            };
            const req = https.request(options, res => {
              let body = '';
              res.on('data', d => body += d);
              res.on('end', () => console.log('IndexNow response:', res.statusCode, body));
            });
            req.on('error', e => console.error('IndexNow error:', e.message));
            req.write(data);
            req.end();
          "
        if: always()
